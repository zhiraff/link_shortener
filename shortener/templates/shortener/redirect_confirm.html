<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Необходимо подтверждение перехода</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .warning-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .url-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #f44336;
            color: white;
        }
        .btn-secondary:hover {
            background: #da190b;
        }
        .warning-text {
            color: #f44336;
            font-size: 14px;
            margin: 20px 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠️</div>
        <h1>Для перехода необходимо подтверждение</h1>
        <p>Вы собираетесь перейти на сайт:</p>
        <div class="url-display">{{ target_url }}</div>
        <p>Однако хост {{ host }} помечен как нежелательный, по причине:</p>
        <div class="url-display">{{ reason }}</div>
        <p>Продолжить переход?</p>
        <div class="buttons">
            <a href="{{ target_url }}" class="btn btn-primary" 
               onclick="handleRedirect(event)">Да, перейти</a>
            <a href="javascript:history.back()" class="btn btn-secondary">Нет, вернуться</a>
        </div>
        
        <p class="warning-text">Будьте внимательны при посещении таких сайтов!</p>
    </div>

    <script>
        function handleRedirect(event) {
            event.preventDefault();
            // Можно добавить дополнительную логику перед редиректом
            // Например, отправить аналитику
            console.log('User confirmed redirect to:', '{{ target_url|escapejs }}');
            window.location.href = '{{ target_url|safe }}';
        }
    </script>
</body>
</html>
